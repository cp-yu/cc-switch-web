name: Build Web Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-web:
    name: Build Web (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x86_64
            runner: windows-2022
            asset_suffix: windows-x86_64.exe
            binary_path: crates/server/target/release/cc-switch-web.exe
          - label: macOS x86_64
            runner: macos-13
            asset_suffix: macos-x86_64
            binary_path: crates/server/target/release/cc-switch-web
          - label: Linux x86_64 (Ubuntu 20.04)
            runner: ubuntu-20.04
            asset_suffix: linux-x86_64-ubuntu20.04
            binary_path: crates/server/target/release/cc-switch-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Resolve release metadata
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi

          ASSET_NAME="cc-switch-web-v${VERSION}-${{ matrix.asset_suffix }}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        shell: bash
        run: npm ci

      - name: Build frontend (Web mode)
        shell: bash
        run: npm run build:web

      - name: Verify frontend build
        shell: bash
        run: |
          test -f dist/index.html
          ls -la dist/

      - name: Build backend (Release mode)
        shell: bash
        run: cargo build --release --manifest-path crates/server/Cargo.toml

      - name: Create release asset
        shell: bash
        run: |
          mkdir -p release-assets
          cp "${{ matrix.binary_path }}" "release-assets/${ASSET_NAME}"

          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x "release-assets/${ASSET_NAME}"
          fi

          ls -lah release-assets/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_suffix }}
          path: release-assets/
          retention-days: 7

  release:
    name: Publish Web release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-web
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Restore executable bits
        shell: bash
        run: |
          chmod +x release-assets/cc-switch-web-v${GITHUB_REF_NAME#v}-macos-x86_64
          chmod +x release-assets/cc-switch-web-v${GITHUB_REF_NAME#v}-linux-x86_64-ubuntu20.04
          ls -lah release-assets/

      - name: Create release notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          {
            printf '## CC-Switch Web v%s\n\n' "$VERSION"
            printf '%s\n\n' 'Official GitHub Releases now publish the Web runtime only.'
            printf '%s\n' '### Assets'
            printf -- '- Windows x86_64: `cc-switch-web-v%s-windows-x86_64.exe`\n' "$VERSION"
            printf -- '- macOS x86_64: `cc-switch-web-v%s-macos-x86_64`\n' "$VERSION"
            printf -- '- Linux x86_64 baseline: `cc-switch-web-v%s-linux-x86_64-ubuntu20.04` (built on Ubuntu 20.04)\n\n' "$VERSION"
            printf '%s\n' '### Quick start'
            printf -- '- Windows: run `cc-switch-web-v%s-windows-x86_64.exe`\n' "$VERSION"
            printf -- '- macOS: `chmod +x ./cc-switch-web-v%s-macos-x86_64 && ./cc-switch-web-v%s-macos-x86_64`\n' "$VERSION" "$VERSION"
            printf -- '- Linux: `chmod +x ./cc-switch-web-v%s-linux-x86_64-ubuntu20.04 && ./cc-switch-web-v%s-linux-x86_64-ubuntu20.04`\n\n' "$VERSION" "$VERSION"
            printf '%s\n' '### Runtime configuration'
            printf '%s\n' '- Default address: `http://127.0.0.1:17666`'
            printf '%s\n' '- Override port: `CC_SWITCH_PORT=8080`'
            printf '%s\n\n' '- Override host: `CC_SWITCH_HOST=0.0.0.0`'
            printf '%s\n' 'Desktop Tauri packages are not part of this release.'
          } > release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
